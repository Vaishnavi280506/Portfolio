<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="portfolio.css">
</head>
<body onpageshow="handlePageShow(event)">
    <!--Landing Page-->
<div class="main">
    <div class="container">
        <div class="card">
            <div class="left">
                <div class="tags">
                    <span>System ready</span>
                    <span>Portfolio 2026</span>
                    <span>UI Loading</span>
                    <h1>Welcome to <br>My Portfolio<br> Website</h1>
                    <p>Building mordern,realiable and fast digital experiences<br> with a focus on clean UI.</p>
                    <h3>LIVE STATUS</h3>
                </div>
                <div class="buttons">
                    <button><i class="fa-solid fa-code"></i> Code</button>
                    <button><i class="fa-solid fa-user"></i> Profile</button>
                    <button><i class="fa-brands fa-github"></i> Source</button>
                </div>
            </div>
            <div class="right">
                <h4>Core UI</h4>
                <div class="circle">
                    <div class="center">Welcome</div>
                    <div class="orbit">
                        <div class=" dot dot1"><i class="fa-solid fa-wifi"></i></div>
                        <div class=" dot dot2"><i class="fa-solid fa-bug"></i></div>
                        <div class=" dot dot3"><i class="fa-solid fa-bolt-lightning"></i></div>
                        <div class=" dot dot4"><i class="fa-solid fa-code-fork"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="portfolio.js"></script>
</body>
</html>
